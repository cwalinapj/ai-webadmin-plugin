name = "webadmin-control-plane"
main = "src/index.ts"
compatibility_date = "2026-02-26"

[[d1_databases]]
binding = "DB"
database_name = "webadmin_control_plane"
database_id = "REPLACE_WITH_REAL_DATABASE_ID"
migrations_dir = "src/db/migrations"

[[queues.producers]]
binding = "JOB_QUEUE"
queue = "webadmin-jobs"

[[queues.producers]]
binding = "JOB_DLQ"
queue = "webadmin-jobs-dlq"

[[queues.consumers]]
queue = "webadmin-jobs"
dead_letter_queue = "webadmin-jobs-dlq"

[[durable_objects.bindings]]
name = "SITE_LOCK"
class_name = "SiteLock"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SiteLock"]

[ai]
binding = "AI"

[vars]
REPLAY_WINDOW_SECONDS = "300"
CAP_TOKEN_HOST_OPTIMIZER_WRITE = "REPLACE_ME"
ANALYTICS_GOAL_ASSISTANT_USE_AI = "1"
ANALYTICS_GOAL_ASSISTANT_MODEL = "@cf/meta/llama-3.1-8b-instruct"
WATCHDOG_AUTOMATION_ENABLED = "0"
WATCHDOG_AUTOMATION_ENABLE_RPS_THRESHOLD = "180"
WATCHDOG_AUTOMATION_DISABLE_RPS_THRESHOLD = "120"
WATCHDOG_AUTOMATION_RPS_PER_LOAD_AVG = "60"
WATCHDOG_AUTOMATION_COOLDOWN_SECONDS = "300"
WATCHDOG_AUTOMATION_DRY_RUN = "1"
WATCHDOG_AUTOMATION_SITE_TEMPLATE = "{domain}"
WATCHDOG_AUTOMATION_SITE_CONFIG_TEMPLATE = "/etc/nginx/sites-available/{domain}.conf"
WATCHDOG_AUTOMATION_PANEL_BASE_URL = "http://127.0.0.1:8080"
WATCHDOG_AUTOMATION_BACKENDS = "127.0.0.1:18120,127.0.0.1:18122"
WATCHDOG_AUTOMATION_REQUEST_TIMEOUT_MS = "8000"
