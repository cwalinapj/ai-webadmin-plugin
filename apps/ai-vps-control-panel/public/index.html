<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI VPS Control Panel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>AI VPS Control Panel</h1>
      <div class="auth">
        <input id="tokenInput" type="password" placeholder="API token" />
        <button id="saveTokenBtn" type="button">Save Token</button>
        <button id="refreshAllBtn" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Sites</h2>
        <form id="siteForm" class="form">
          <input name="id" placeholder="site id" required />
          <input name="domain" placeholder="domain" required />
          <input name="tenant_id" placeholder="tenant id (optional)" />
          <input name="panel_type" placeholder="panel type" value="ai_vps_panel" />
          <input name="runtime_type" placeholder="runtime type" value="php_generic" />
          <button type="submit">Save Site</button>
        </form>
        <ul id="siteList" class="list"></ul>
      </section>

      <section class="panel">
        <h2>Chat</h2>
        <form id="chatForm" class="form">
          <select id="chatSiteSelect" required></select>
          <textarea id="chatMessageInput" rows="4" placeholder="Type command prompt for AI agent"></textarea>
          <button type="submit">Send</button>
        </form>
        <div id="chatOutput" class="output"></div>
      </section>

      <section class="panel">
        <h2>Action Queue</h2>
        <div class="inline-controls">
          <select id="queueStatusFilter">
            <option value="">All</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="executed">Executed</option>
            <option value="failed">Failed</option>
          </select>
          <button id="loadQueueBtn" type="button">Load Queue</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Site</th>
              <th>Type</th>
              <th>Risk</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="queueTableBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Audit</h2>
        <button id="loadAuditBtn" type="button">Load Audit</button>
        <ul id="auditList" class="list"></ul>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
