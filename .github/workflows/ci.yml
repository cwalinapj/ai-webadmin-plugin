name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  control-panel-smoke:
    name: Control Panel Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/panel-addon-core/package-lock.json
            apps/ai-vps-control-panel/package-lock.json

      - name: Install panel addon core dependencies
        run: npm --prefix apps/panel-addon-core ci

      - name: Install control panel dependencies
        run: npm --prefix apps/ai-vps-control-panel ci

      - name: Run control panel queue/approve/execute smoke test
        run: npm --prefix apps/ai-vps-control-panel test -- --run tests/server.test.ts -t "emits audit metrics/log fields for queue approve execute flow"

  host-ops-smoke:
    name: Host Ops Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate script syntax
        run: |
          for script in scripts/*.sh scripts/lib/*.sh; do
            bash -n "$script"
          done

      - name: Run host ops smoke tests
        run: ./scripts/test-host-ops-smoke.sh

  worker-tests:
    name: Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/control-plane-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/control-plane-worker/package-lock.json

      - name: Install worker dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

  php-agent-tests:
    name: PHP Agent Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/webadmin-edge-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPUnit
        run: composer test

      - name: Build edge-agent zip
        working-directory: .
        run: ./scripts/build-webadmin-edge-agent-zip.sh
